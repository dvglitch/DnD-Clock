name: Build and Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconfirm DnD-Clock.spec

    - name: Prepare Distribution
      shell: pwsh
      run: |
        if (!(Test-Path "dist/sounds")) { New-Item -ItemType Directory -Path "dist/sounds" }
        if (!(Test-Path "dist/images")) { New-Item -ItemType Directory -Path "dist/images" }
        if (Test-Path "static/sounds/*") { Copy-Item -Path "static/sounds/*" -Destination "dist/sounds/" -Recurse -Force -ErrorAction SilentlyContinue }
        if (Test-Path "static/images/*") { Copy-Item -Path "static/images/*" -Destination "dist/images/" -Recurse -Force -ErrorAction SilentlyContinue }

    - name: Archive dist
      run: |
        Compress-Archive -Path dist\* -DestinationPath DnD-Clock-Windows.zip
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Build
        body: |
          Automated build from the latest push to main.
          
          **How to use:**
          1. Download `DnD-Clock-Windows.zip`
          2. Extract the folder
          3. Run `DnD-Clock.exe`
        files: DnD-Clock-Windows.zip
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
