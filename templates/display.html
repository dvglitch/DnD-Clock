    <html>
    <head>
        <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    </head>
    <body style="font-family:sans-serif; background:#111; color:white; margin:0;">

        <h1 style="text-align:center; padding:5px;">Attack Order</h1>

        <div id="timers" style="
            display:grid;
            grid-template-columns:repeat(3,1fr);
            gap:18px;
            padding:18px;
        "></div>
                                  
        <div style="text-align:center; margin-bottom:20px;">
            <div>Scan to control your timer</div>
            <img src="/qr" width="150">
        </div>  

        <script>
            const socket = io("http://" + location.hostname + ":5000");

            let numTimers = 6;
            let dmExclusive = false;

            function formatTime(s) {
                let m = Math.floor(s / 60);
                let sec = Math.floor(s % 60);
                return `${m}:${sec.toString().padStart(2, '0')}`;
            }

            socket.on("control_update", (data) => {
                numTimers = data.num_timers || 6;
                dmExclusive = data.dm_exclusive || false;
            });

            socket.on("update", (data) => {
                const container = document.getElementById("timers");
                container.innerHTML = "";

                for (let i = 1; i <= numTimers; i++) {
                    const t = data[i];
                    if (!t) continue; // Skip if timer doesn't exist

                    let bg = "#444"; // paused
                    if (t.running) bg = "#1e7f3f"; // green
                    if (t.remaining <= 0) bg = "#a83232"; // red

                    let border = "2px solid transparent";

                    if (t.position === 1) border = "4px solid gold";
                    else if (t.position === 2) border = "4px solid silver";
                    else if (t.position === 3) border = "4px solid #cd7f32";

                    const div = document.createElement("div");
                    div.style = `
                        background:${bg};
                        border-radius:15px;
                        padding:30px;
                        text-align:center;
                        font-size:30px;
                        ${border};
                        box-shadow:0 4px 10px rgba(0,0,0,0.5);
                        transition: all 0.3s ease;
                    `;

                    div.innerHTML = `
                        <div style="font-size:24px; margin-bottom:10px;">
                            ${t.name || "Timer " + i}
                        </div>

                        <div style="font-size:64px; font-weight:bold;">
                            ${formatTime(t.remaining)}
                        </div>

                        <div style="margin-top:10px;">
                            ${t.running ? "Running" : (t.remaining <= 0 ? "Finished" : "Paused")}
                        </div>

                        ${t.position ? `
                            <div style="margin-top:15px; font-size:28px;">
                                Order: ${t.position}
                            </div>
                        ` : ""}
                    `;

                    container.appendChild(div);
                }
            });
        </script>
    </body>
    </html>
