    <html>
        <head>
            <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
            <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
            <link rel="stylesheet" href="/static/css/styles.css">
        </head>
        <body class="theme-tavern page-control">
            <!-- Navigation -->
            <button id="nav-left" class="nav-btn" onclick="showSlide('prev')" style="position:fixed; top:50%; left:0; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:white; border:none; font-size:40px; padding:20px 10px; cursor:pointer; z-index:1000; border-radius:0 10px 10px 0; transition: background 0.2s;">&#10094;</button>
            <button id="nav-right" class="nav-btn" onclick="showSlide('next')" style="position:fixed; top:50%; right:0; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:white; border:none; font-size:40px; padding:20px 10px; cursor:pointer; z-index:1000; border-radius:10px 0 0 10px; transition: background 0.2s;">&#10095;</button>

            <h1 style="margin-bottom:30px;">Control Panel</h1>

            <!-- SLIDE 1: SETUP & INITIATIVE -->
            <div id="slide-1" class="slide" style="display:none; animation:fadeIn 0.3s; padding-bottom:40px;">
                <h2 style="margin-bottom:30px;">Settings & Constraints</h2>
                <div style="display:grid; grid-template-columns:repeat(12, 1fr); gap:40px; justify-items:center; align-items:flex-start; background:#222; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); width:90%; margin:auto;">
                    
                    <!-- Row 1: Themes & Sounds (3 items, 4 cols each) -->
                    <div style="grid-column: span 4; width:100%;">
                        <h3 style="margin:0 0 10px 0;">Background Theme</h3>
                        <select id="themeSelect" onchange="changeTheme()" style="background:#333; color:white; border:1px solid #555; padding:8px 10px; border-radius:5px; font-size:16px; font-family:'Inter', sans-serif; width:100%; box-sizing:border-box;">
                            <option value="tavern">Tavern Room</option>
                            <option value="table">Wooden Table</option>
                            <option value="stone">Stone Floor</option>
                            <option value="forest">Dark Forest</option>
                            <option value="dungeon">Dungeon Wall</option>
                            <option value="parchment">Ancient Parchment</option>
                        </select>
                        <div style="margin-top:10px;">
                            <input id="customBg" type="text" placeholder="Or Image URL..." style="background:#333; color:white; border:1px solid #555; border-radius:5px; padding:8px 10px; width:100%; box-sizing:border-box; margin:0;" onchange="setCustomBg()">
                        </div>
                    </div>

                    <div style="grid-column: span 4; width:100%;">
                        <h3 style="margin:0 0 10px 0;">Timer Done Sound</h3>
                        <select id="timerSoundSelect" onchange="changeTimerSound()" style="background:#333; color:white; border:1px solid #555; padding:8px 10px; border-radius:5px; font-size:16px; font-family:'Inter', sans-serif; width:100%; box-sizing:border-box;">
                            <option value="synthetic">Synthetic (Default)</option>
                        </select>
                    </div>

                    <div style="grid-column: span 4; width:100%;">
                        <h3 style="margin:0 0 10px 0;">Hand Raise Sound</h3>
                        <select id="handSoundSelect" onchange="changeHandSound()" style="background:#333; color:white; border:1px solid #555; padding:8px 10px; border-radius:5px; font-size:16px; font-family:'Inter', sans-serif; width:100%; box-sizing:border-box;">
                            <option value="synthetic">Synthetic (Default)</option>
                        </select>
                    </div>

                    <!-- Row 2: Logic & Controls (4 items, 3 cols each) -->
                    <div style="grid-column: span 3; width:100%;">
                        <h3 style="margin:0 0 10px 0;">Combatants</h3>
                        <button onclick="addTimer()" style="padding:10px 20px; font-weight:bold; background:#1e7f3f; color:white; border:none; border-radius:5px; cursor:pointer; width:100%;">+ Add Timer</button>
                        <div style="margin-top:10px; font-size:12px; opacity:0.8;">Manage from combat tab</div>
                    </div>

                    <div style="grid-column: span 3; width:100%;">
                        <h3 style="margin:0 0 10px 0;">Default Time (s)</h3>
                        <div style="display:flex; gap:5px;">
                            <input id="allTime" type="number" value="180" style="width:100%; box-sizing:border-box; background:#333; color:white; border:1px solid #555; border-radius:5px; padding:8px;">
                            <button onclick="setAll()" style="padding:8px 15px; background:#444; border:1px solid #555; color:white; border-radius:5px;">Set</button>
                        </div>
                    </div>

                    <div style="grid-column: span 3; width:100%;">
                        <h3 style="margin:0 0 15px 0;">Master Controls</h3>
                        <label class="switch">
                            <input type="checkbox" id="lockToggle1" onchange="toggleLock('lockToggle1')">
                            <span class="slider"></span>
                        </label>
                        <div id="lockLabel1" style="margin-top:10px; font-weight:bold; font-size:14px;">🔓 Unlocked</div>
                    </div>

                    <div style="grid-column: span 3; width:100%;">
                        <h3 style="margin:0 0 15px 0;">Quick Adjust</h3>
                        <div style="display:flex; align-items:center; gap:20px; justify-content:center; margin-bottom:10px;">
                            <div style="display:flex; align-items:center; gap:5px;">
                                <input id="adjustIntervalInput" type="number" min="1" style="width:60px; padding:5px; background:#333; color:white; border:1px solid #555; border-radius:5px;" onchange="setAdjustInterval()">
                                <span style="font-size:14px; opacity:0.8;">sec</span>
                            </div>
                            <label class="switch" style="margin:0;">
                                <input type="checkbox" id="adjustLockToggle" onchange="toggleAdjustLock()">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div id="adjustLockLabel" style="font-weight:bold; font-size:14px;">🔓 Unlocked</div>
                    </div>
                </div>

                <hr style="border:1px solid #444; margin:40px auto; width:80%;">

                <h2 style="margin-bottom:30px;">Initiative Sync</h2>
                <div style="margin-bottom:40px; background:#222; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); width:80%; margin:auto;">
                    <div style="display:flex; justify-content:center; gap:20px; align-items:center; flex-wrap:wrap; margin-bottom:20px;">
                        <select id="initMode" style="background:#333; color:white; border:1px solid #555; padding:8px; border-radius:5px; font-family:'Inter', sans-serif;">
                            <option value="proportional">Proportional (Default Time)</option>
                            <option value="interval">Interval (Max time becomes Default)</option>
                        </select>
                        <input id="initInterval" type="number" placeholder="Interval (s)" value="30" style="width:100px; padding:8px; background:#333; color:white; border:1px solid #555; border-radius:5px;">
                        <button onclick="calculateInitiatives()" style="background:#1e7f3f; color:white; border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">Set Initiatives</button>
                    </div>                    
                    <div id="init-list" style="margin-top:30px; display:grid; grid-template-columns:repeat(2, 1fr); gap:15px; text-align:left;"></div>
                </div>
            </div>

            <!-- SLIDE 2: COMBAT -->
            <div id="slide-2" class="slide" style="display:block; animation:fadeIn 0.3s; padding-bottom:40px;">
                <h2 style="margin-bottom:20px;">Active Combat</h2>
                <div style="display:flex; justify-content:center; gap:40px; align-items:center; background:#222; padding:15px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); width:80%; margin:auto; margin-bottom:30px;">
                    <div>
                        <button id="toggleAllBtn" onclick="toggleAll()">▶ Start All</button>
                        <button onclick="resetAll()">🔄 Reset All</button>
                    </div>
                    <div>
                        <span style="font-weight:bold; margin-right:15px; opacity:0.8;">Compact UI</span>
                        <label class="switch" style="vertical-align:middle;">
                            <input type="checkbox" id="compactToggle" onchange="toggleCompact()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div>
                        <span style="font-weight:bold; margin-right:15px; opacity:0.8;">Master Lock</span>
                        <label class="switch" style="vertical-align:middle;">
                            <input type="checkbox" id="lockToggle3" onchange="toggleLock('lockToggle3')">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>

                <div id="timers" style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:20px;"></div>
            </div>

            <style>
                @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                .nav-btn:hover { background: rgba(0,0,0,0.8); }
            </style>
            <script src="/static/js/control.js"></script>
        </body>
    </html>
