    <html>
        <head>
            <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
            <style>
            body { font-family: sans-serif; text-align: center; background: #111; color: white; margin: 0; padding-top: 20px; }
            button { background: #555; color: white; border: none; padding: 0 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin: 5px; transition: background 0.3s; box-sizing: border-box; height: 42px; vertical-align: middle; line-height: 42px; }
            button:hover { background: #777; }
            input[type=number], input[type=text] { background: #222; color: white; border: 1px solid #555; padding: 0 10px; border-radius: 5px; font-size: 16px; text-align: center; box-sizing: border-box; height: 42px; vertical-align: middle; }
            h1, h3 { color: #f5f5f5; }

            .timer-running button { background: #2b9952; }
            .timer-running button:hover { background: #3bcc6b; }
            .timer-running input[type=number], .timer-running input[type=text] { background: #14532a; border-color: #2b9952; }

            .timer-finished button { background: #c44141; }
            .timer-finished button:hover { background: #e04a4a; }
            .timer-finished input[type=number], .timer-finished input[type=text] { background: #7a2525; border-color: #c44141; }
            
            .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            }

            .switch input {
            display: none;
            }

            .slider {
            position: absolute;
            cursor: pointer;
            background-color: #4CAF50;
            border-radius: 34px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            transition: 0.3s;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
            }

            .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            border-radius: 50%;
            transition: 0.3s;
            }

            input:checked + .slider {
            background-color: #f44336;
            }

            input:checked + .slider:before {
            transform: translateX(26px);
            }
            </style>
        </head>
        <body>
            <h1>Control Panel</h1>

            <!-- ROW 1: Action Controls -->
            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:40px; justify-items:center; align-items:flex-end; margin-bottom:40px; background:#222; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); width:70%; margin-left:auto; margin-right:auto;">
                <div>
                    <h3 style="margin:0 0 10px 0;">Global Actions</h3>
                    <button id="toggleAllBtn" onclick="toggleAll()">▶ Start All</button>
                    <button onclick="resetAll()">🔄 Reset All</button>
                </div>

                <div>
                    <h3 style="margin:0 0 10px 0;">Set Default Time (s)</h3>
                    <input id="allTime" type="number" value="180" style="width:80px; margin: 5px;">
                    <button onclick="setAll()">Apply</button>
                </div>

                <div>
                    <h3 style="margin:0 0 10px 0;">Number of Timers</h3>
                    <input id="numTimers" type="number" value="6" min="1" max="12" style="width:60px; margin: 5px;">
                    <button onclick="setNumTimers()">Apply</button>
                </div>
            </div>

            <!-- ROW 2: Toggles -->
            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:40px; justify-items:center; align-items:flex-start; margin-bottom:40px; background:#222; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); width:70%; margin-left:auto; margin-right:auto;">
                <div>
                    <h3 style="margin:0 0 15px 0;">Master Controls</h3>
                    <label class="switch">
                        <input type="checkbox" id="lockToggle" onchange="toggleLock()">
                        <span class="slider"></span>
                    </label>
                    <div id="lockLabel" style="margin-top:10px; font-weight:bold;">Master Controls: 🔓 Unlocked</div>
                </div>

                <div>
                    <h3 style="margin:0 0 15px 0;">Disable +-30s Buttons</h3>
                    <label class="switch">
                        <input type="checkbox" id="adjustLockToggle" onchange="toggleAdjustLock()">
                        <span class="slider"></span>
                    </label>
                    <div id="adjustLockLabel" style="margin-top:10px; font-weight:bold;">+-30s Controls: 🔓 Unlocked</div>
                </div>

                <div>
                    <h3 style="margin:0 0 15px 0;">DM Exclusive Timer</h3>
                    <label class="switch">
                        <input type="checkbox" id="dmExclusiveToggle" onchange="toggleDmExclusive()">
                        <span class="slider"></span>
                    </label>
                    <div id="dmExclusiveLabel" style="margin-top:10px; font-weight:bold;">Off</div>
                </div>
            </div>

            <!-- TIMERS -->
            <h3>Individual Timer Controls</h3>
            <div id="timers" style="
                display:grid;
                grid-template-columns:repeat(3,1fr);
                gap:20px;
                padding:20px;
            "></div>

            <script>
                const socket = io("http://" + location.hostname + ":5000");

                function formatTime(s) {
                    let m = Math.floor(s / 60);
                    let sec = Math.floor(s % 60);
                    return `${m}:${sec.toString().padStart(2, '0')}`;
                }
                
                let numTimers = 6;
                let dmExclusive = false;
                                  
                socket.on("control_update", (data) => {
                    locked = data.locked || false;
                    adjustLocked = data.adjust_locked || false;
                    numTimers = data.num_timers || 6;
                    dmExclusive = data.dm_exclusive || false;
                    
                    document.getElementById("numTimers").value = numTimers;
                    document.getElementById("dmExclusiveToggle").checked = dmExclusive;
                    
                    if (data.DEFAULT_DURATION !== undefined) {
                        document.getElementById("allTime").value = data.DEFAULT_DURATION;
                    }
                    
                    updateLockUI();
                    updateDmExclusiveUI();
                    
                    // Remove old timer divs that are beyond numTimers
                    for (let i = numTimers + 1; i <= 12; i++) {
                        const div = document.getElementById(`timer-${i}`);
                        if (div) {
                            div.remove();
                        }
                    }
                }); 

                socket.on("update", (data) => {
                    const container = document.getElementById("timers");
                    let anyRunning = false;

                    for (let i = 1; i <= numTimers; i++) {
                        const t = data[i];
                        if (!t) continue; // Skip if timer doesn't exist
                        
                        if (t.running) anyRunning = true;

                        let div = document.getElementById(`timer-${i}`);

                        // ✅ Create once
                        if (!div) {
                            div = document.createElement("div");
                            div.id = `timer-${i}`;
                            div.style = `
                                border-radius:10px;
                                padding:20px;
                                background:#222;
                                box-shadow:0 4px 10px rgba(0,0,0,0.5);
                            `;

                            div.innerHTML = `
                                <div style="display:flex; flex-direction:column; gap:10px;">
                                    <!-- Top Row: Name and Condition side-by-side -->
                                    <div style="display:flex; gap:10px;">
                                        <input 
                                            type="text"
                                            id="name-${i}" 
                                            placeholder="Timer Name"
                                            style="flex:3; box-sizing:border-box; font-weight:bold; font-size:1.1em; margin:0;"
                                        >
                                        <input 
                                            type="text"
                                            id="condition-${i}" 
                                            placeholder="Condition"
                                            style="flex:2; box-sizing:border-box; font-size:1em; margin:0;"
                                        >
                                    </div>

                                    <!-- Time and Status inline -->
                                    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin:10px 0;">
                                        <div id="time-display-${i}" style="font-size:48px; font-weight:bold; line-height:1;"></div>
                                        <div style="text-align:right;">
                                            <div id="status-${i}" style="font-size:14px; text-transform:uppercase; letter-spacing:1px; opacity:0.8;"></div>
                                            <div id="position-${i}" style="font-size:18px; font-weight:bold; margin-top:4px;"></div>
                                        </div>
                                    </div>

                                    <!-- Main Controls -->
                                    <div style="display:flex; gap:10px;">
                                        <button id="toggle-${i}" style="flex:1; margin:0; font-weight:bold;"></button>
                                        <button onclick="resetTimer(${i})" style="flex:1; margin:0;">Reset</button>
                                    </div>

                                    <!-- Adjustments -->
                                    <div style="display:flex; gap:10px;">
                                        <button onclick="adjust(${i}, 30)" style="flex:1; margin:0;">+30s</button>
                                        <button onclick="adjust(${i}, -30)" style="flex:1; margin:0;">-30s</button>
                                    </div>

                                    <!-- Set custom time -->
                                    <div style="display:flex; gap:10px;">
                                        <input id="time-${i}" type="number" placeholder="Seconds" style="flex:2; margin:0; box-sizing:border-box;">
                                        <button onclick="setTimer(${i})" style="flex:1; margin:0;">Set</button>
                                    </div>
                                </div>
                            `;

                            container.appendChild(div);

                            // attach handlers once
                            document.getElementById(`toggle-${i}`).onclick = () => toggle(i);

                            document.getElementById(`name-${i}`).onchange = () => {
                                const name = document.getElementById(`name-${i}`).value;
                                socket.emit("set_name", {timer: i, name});
                            };

                            document.getElementById(`condition-${i}`).onchange = () => {
                                const condition = document.getElementById(`condition-${i}`).value;
                                socket.emit("set_condition", {timer: i, condition});
                            };
                        }

                        // ✅ Update name (only if not actively editing)
                        const nameInput = document.getElementById(`name-${i}`);
                        if (document.activeElement !== nameInput) {
                            nameInput.value = t.name;
                        }

                        // ✅ Update condition (only if not actively editing)
                        const condInput = document.getElementById(`condition-${i}`);
                        if (condInput && document.activeElement !== condInput) {
                            condInput.value = t.condition || "";
                        }

                        // ✅ Update timer display
                        document.getElementById(`time-display-${i}`).innerText = formatTime(t.remaining);
                        document.getElementById(`status-${i}`).innerText = t.running ? "Running" : "Paused";

                        // ✅ Update position (finish order)
                        const posDiv = document.getElementById(`position-${i}`);
                        if (t.position) {
                            posDiv.innerText = `Order: ${t.position}`;
                        } else {
                            posDiv.innerText = "";
                        }

                        // ✅ Update toggle button
                        const toggleBtn = document.getElementById(`toggle-${i}`);
                        toggleBtn.innerText = t.running ? "Pause" : "Start";

                        // ✅ Color states
                        let bg = "#333";
                        let timerClass = "";
                        
                        if (t.running) {
                            bg = "#1e7f3f";
                            timerClass = "timer-running";
                        } else if (t.remaining <= 0) {
                            bg = "#a83232";
                            timerClass = "timer-finished";
                        }

                        div.style.background = bg;
                        div.className = timerClass;
                    }

                    const toggleAllBtn = document.getElementById("toggleAllBtn");
                    if (toggleAllBtn) {
                        toggleAllBtn.innerText = anyRunning ? "⏸ Pause All" : "▶ Start All";
                    }
                });

                function toggle(timer) {
                    socket.emit("toggle", {timer});
                }

                function resetTimer(timer) {
                    socket.emit("reset", {timer});
                }

                function setTimer(timer) {
                    const input = document.getElementById(`time-${timer}`);
                    const seconds = input.value;
                    if (!seconds) return;

                    socket.emit("set_timer", {timer, seconds});
                    input.value = "";
                }

                function adjust(timer, delta) {
                    socket.emit("adjust_timer", {timer, delta});
                }

                function toggleAll() {
                    socket.emit("toggle_all");
                }

                function resetAll() {
                    socket.emit("reset_all");
                }

                function setAll() {
                    const seconds = document.getElementById("allTime").value;
                    socket.emit("set_all_time", {seconds});
                }
                
                function setNumTimers() {
                    const num = document.getElementById("numTimers").value;
                    socket.emit("set_num_timers", {num});
                }
                
                function toggleDmExclusive() {
                    const toggle = document.getElementById("dmExclusiveToggle");
                    const exclusive = toggle.checked;
                    socket.emit("set_dm_exclusive", {exclusive});
                }
                
                function updateDmExclusiveUI() {
                    const toggle = document.getElementById("dmExclusiveToggle");
                    const label = document.getElementById("dmExclusiveLabel");
                    
                    toggle.checked = dmExclusive;
                    
                    if (dmExclusive) {
                        label.innerText = "On (DM only for last timer)";
                    } else {
                        label.innerText = "Off (show all timers everywhere)";
                    }
                }
                                  
                let locked = false;
                let adjustLocked = false;

                function toggleLock() {
                    const toggle = document.getElementById("lockToggle");
                    locked = toggle.checked;

                    socket.emit("lock_controls", {locked});
                    updateLockUI();
                }

                function toggleAdjustLock() {
                    const toggle = document.getElementById("adjustLockToggle");
                    adjustLocked = toggle.checked;

                    socket.emit("lock_adjust", {locked: adjustLocked});
                    updateLockUI();
                }

                function updateLockUI() {
                    const toggle = document.getElementById("lockToggle");
                    const label = document.getElementById("lockLabel");
                    const adjustToggle = document.getElementById("adjustLockToggle");
                    const adjustLabel = document.getElementById("adjustLockLabel");

                    toggle.checked = locked;
                    if (adjustToggle) adjustToggle.checked = adjustLocked;

                    if (locked) {
                        label.innerText = "Master Controls: 🔒 Locked";
                    } else {
                        label.innerText = "Master Controls: 🔓 Unlocked";
                    }

                    if (adjustLabel) {
                        if (adjustLocked) {
                            adjustLabel.innerText = "+-30s Controls: 🔒 Locked";
                        } else {
                            adjustLabel.innerText = "+-30s Controls: 🔓 Unlocked";
                        }
                    }
                }
            </script>
        </body>
    </html>
